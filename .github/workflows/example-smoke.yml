name: Live COPC Browser Evidence

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: example-browser-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Use project npm version
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run smoke:example:install-browser

      - name: Verify live COPC range sources
        run: npm run live:copc-range

      - name: Verify packaged consumer against live COPC
        run: npm run smoke:package

      - name: Run URL and local-file browser smoke
        run: npm run smoke:example:file

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: example-browser-smoke
          if-no-files-found: ignore
          path: |
            output/playwright/
            output/example-smoke/
            output/live-copc-range/
            output/package-smoke/
            .playwright-cli/
