version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: "03:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "03:30"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
