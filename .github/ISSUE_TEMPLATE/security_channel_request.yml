name: Private security channel request
description: Request a private reporting channel without disclosing vulnerability details
title: "[Security channel]: Private reporting unavailable"
body:
  - type: markdown
    attributes:
      value: |
        Use this form only when GitHub's private security advisory form is unavailable. Do not include vulnerability details, reproduction steps, affected URLs, logs, credentials, or other sensitive information. A maintainer must establish a private channel before any technical disclosure.

  - type: input
    id: advisory_form_result
    attributes:
      label: Private advisory form result
      description: State only that the private form was unavailable or inaccessible; do not include technical details.
      placeholder: "The private advisory form was unavailable on YYYY-MM-DD."
    validations:
      required: true

  - type: checkboxes
    id: safety_confirmation
    attributes:
      label: Safety confirmation
      options:
        - label: I have not included any vulnerability details or sensitive information in this public issue.
          required: true
