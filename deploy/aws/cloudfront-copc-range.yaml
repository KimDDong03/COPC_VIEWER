AWSTemplateFormatVersion: "2010-09-09"
Description: Private S3 origin and public CloudFront distribution for browser COPC range reads.

Parameters:
  BucketName:
    Type: String
    Default: ""
    Description: Optional globally unique S3 bucket name. Leave empty to let CloudFormation name it.
  AlternateDomainNames:
    Type: CommaDelimitedList
    Description: CloudFront alias names, such as copc.example.com. Required to enforce TLS 1.2+ with ACM.
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 covering every AlternateDomainNames entry.
  AllowedCorsOrigins:
    Type: CommaDelimitedList
    Description: Explicit browser origins allowed to read COPC objects through CloudFront. CORS is not viewer authentication.
  AllowedObjectPrefix:
    Type: String
    Default: copc/public/
    AllowedPattern: "^[A-Za-z0-9][A-Za-z0-9._/-]*/$"
    ConstraintDescription: Use a non-empty S3 key prefix ending in /.
    Description: Only objects below this S3 key prefix are readable through CloudFront OAC.

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, ""]]

Resources:
  CopcBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref BucketName, !Ref AWS::NoValue]
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !Ref AllowedCorsOrigins
            AllowedMethods:
              - GET
              - HEAD
            AllowedHeaders:
              - Range
              - If-Range
              - If-None-Match
            ExposedHeaders:
              - Accept-Ranges
              - Content-Length
              - Content-Range
              - ETag
              - Age
              - X-Cache
            MaxAge: 600

  CopcOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-copc-s3-oac"
        Description: Signed CloudFront access to the private COPC S3 origin.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CopcCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${AWS::StackName}-copc-range-cache"
        Comment: Minimal cache key for immutable COPC object keys; compression disabled.
        DefaultTTL: 86400
        MinTTL: 0
        MaxTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: false
          EnableAcceptEncodingGzip: false
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  CopcResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-copc-cors"
        Comment: CORS headers for browser COPC range and validator requests.
        CorsConfig:
          AccessControlAllowCredentials: false
          AccessControlAllowHeaders:
            Items:
              - Range
              - If-Range
              - If-None-Match
          AccessControlAllowMethods:
            Items:
              - GET
              - HEAD
              - OPTIONS
          AccessControlAllowOrigins:
            Items: !Ref AllowedCorsOrigins
          AccessControlExposeHeaders:
            Items:
              - Accept-Ranges
              - Content-Length
              - Content-Range
              - ETag
              - Age
              - X-Cache
          AccessControlMaxAgeSec: 600
          OriginOverride: true
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true

  CopcOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "${AWS::StackName}-copc-cors-origin"
        Comment: Forward only the headers S3 needs to evaluate CORS preflight.
        CookiesConfig:
          CookieBehavior: none
        QueryStringsConfig:
          QueryStringBehavior: none
        HeadersConfig:
          HeaderBehavior: whitelist
          Headers:
            - Origin
            - Access-Control-Request-Headers
            - Access-Control-Request-Method

  CopcRequestGuardFunction:
    Type: AWS::CloudFront::Function
    Properties:
      AutoPublish: true
      FunctionConfig:
        Comment: Reject query-string identities; immutable COPC paths are the complete cache key.
        Runtime: cloudfront-js-2.0
      Name: !Sub "${AWS::StackName}-copc-request-guard"
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.querystring && Object.keys(request.querystring).length > 0) {
            return {
              statusCode: 400,
              statusDescription: 'Bad Request',
              headers: {
                'cache-control': { value: 'no-store' },
                'content-type': { value: 'text/plain; charset=utf-8' }
              }
            };
          }
          return request;
        }

  CopcDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${AWS::StackName} private S3 COPC range distribution"
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_All
        Aliases: !Ref AlternateDomainNames
        Origins:
          - Id: CopcS3Origin
            DomainName: !GetAtt CopcBucket.RegionalDomainName
            OriginAccessControlId: !Ref CopcOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: CopcS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref CopcCachePolicy
          OriginRequestPolicyId: !Ref CopcOriginRequestPolicy
          ResponseHeadersPolicyId: !Ref CopcResponseHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt CopcRequestGuardFunction.FunctionARN
          Compress: false
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only

  CopcBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CopcBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOacReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${CopcBucket.Arn}/${AllowedObjectPrefix}*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CopcDistribution}"

Outputs:
  BucketName:
    Description: Private versioned S3 bucket for COPC objects.
    Value: !Ref CopcBucket
  DistributionId:
    Description: CloudFront distribution ID.
    Value: !Ref CopcDistribution
  DistributionDomainName:
    Description: CloudFront distribution domain name.
    Value: !GetAtt CopcDistribution.DomainName
  AllowedObjectPrefix:
    Description: Only this S3 key prefix is authorized for CloudFront reads.
    Value: !Ref AllowedObjectPrefix
