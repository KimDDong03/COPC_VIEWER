<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>COPC Cesium Prototype</title>
  </head>
  <body>
    <div id="app">
      <div id="cesium-container"></div>
      <section id="copc-panel" aria-label="COPC metadata">
        <form id="copc-form">
          <label for="copc-sample-select">Sample</label>
          <select id="copc-sample-select"></select>
          <label class="copc-url-label" for="copc-url">COPC URL</label>
          <div class="copc-controls">
            <input
              id="copc-url"
              name="copc-url"
              type="url"
            />
            <button type="submit">Inspect</button>
          </div>
          <div class="copc-projection-controls">
            <label for="copc-source-crs">Source CRS</label>
            <input
              id="copc-source-crs"
              name="copc-source-crs"
              type="text"
              autocomplete="off"
              placeholder="EPSG:32611"
            />
            <label for="copc-source-definition">proj4 definition</label>
            <textarea
              id="copc-source-definition"
              name="copc-source-definition"
              rows="3"
              spellcheck="false"
              placeholder="+proj=utm +zone=11 +datum=WGS84 +units=m +no_defs +type=crs"
            ></textarea>
          </div>
        </form>
        <label class="copc-node-label" for="copc-node-select">Hierarchy node</label>
        <select id="copc-node-select" disabled>
          <option value="">Load a COPC URL first</option>
        </select>
        <div class="copc-hierarchy-pages">
          <p id="copc-hierarchy-pages">Hierarchy pages: not loaded.</p>
          <button id="copc-load-more-hierarchy" type="button" disabled>
            Load next page
          </button>
        </div>
        <div class="copc-suggestion">
          <p id="copc-suggestion">Suggested node: not available.</p>
          <button id="copc-apply-suggestion" type="button" disabled>
            Apply
          </button>
        </div>
        <div class="copc-render-set">
          <p id="copc-render-set">Render set: empty.</p>
          <label class="copc-toggle" for="copc-auto-stream">
            <input id="copc-auto-stream" type="checkbox" disabled />
            Stream on camera move
          </label>
          <div class="copc-render-set-controls">
            <button id="copc-add-selected" type="button" disabled>
              Add selected
            </button>
            <button id="copc-add-suggestion" type="button" disabled>
              Add suggested
            </button>
            <button id="copc-auto-lod" type="button" disabled>
              Auto LOD
            </button>
            <button id="copc-render-set-button" type="button" disabled>
              Render set
            </button>
            <button id="copc-clear-set" type="button" disabled>
              Clear
            </button>
          </div>
        </div>
        <p id="copc-status">Ready to inspect COPC metadata.</p>
        <dl id="copc-metadata"></dl>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
